<!DOCTYPE html>
<html>

<body>
    <div id="output"></div>
    <script>
        const icons = [
            { name: 'icon', src: 'icon.svg', sizes: [16, 32, 128] },
            { name: 'shield_warning', src: 'shield_warning.svg', sizes: [16, 32, 128] }
        ];

        async function convert() {
            const output = {};

            for (const icon of icons) {
                // Load SVG Image
                const img = new Image();
                img.src = icon.src;
                await new Promise(r => img.onload = r);

                for (const size of icon.sizes) {
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, size, size);

                    const dataUrl = canvas.toDataURL('image/png');
                    const key = `${icon.name}${size}.png`;
                    output[key] = dataUrl.split(',')[1]; // Get Base64 only
                }
            }

            document.getElementById('output').textContent = JSON.stringify(output);
        }

        convert();
    </script>
</body>

</html>
