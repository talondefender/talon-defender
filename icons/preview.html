<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talon Defender Icons Preview</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 48px; height: 48px; margin-bottom: 10px; }
        .card h3 { font-size: 14px; margin: 0; color: #333; }
        .dark-mode .card { background: #2C3E50; }
        .dark-mode .card h3 { color: #ecf0f1; }
    </style>
</head>
<body>
    <h1>Talon Defender Icons</h1>
    <div class="grid">
        <div class="card">
            <img src="icon.svg" alt="Main Icon">
            <h3>Main Logo</h3>
        </div>
        <div class="card">
            <img src="dashboard.svg" alt="Dashboard">
            <h3>Dashboard</h3>
        </div>
        <div class="card">
            <img src="stats.svg" alt="Stats">
            <h3>Stats</h3>
        </div>
        <div class="card">
            <img src="settings.svg" alt="Settings">
            <h3>Settings</h3>
        </div>
        <div class="card">
            <img src="power.svg" alt="Power">
            <h3>Power Toggle</h3>
        </div>
        <div class="card">
            <img src="whitelist.svg" alt="Whitelist">
            <h3>Whitelist</h3>
        </div>
        <div class="card">
            <img src="report.svg" alt="Report">
            <h3>Report</h3>
        </div>
        <div class="card">
            <img src="shield_check.svg" alt="Shield Check">
            <h3>Shield Check</h3>
        </div>
        <div class="card">
            <img src="shield_warning.svg" alt="Shield Warning">
            <h3>Shield Warning</h3>
        </div>
    </div>
</body>
</html>
